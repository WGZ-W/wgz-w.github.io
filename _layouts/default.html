


<!DOCTYPE html>
<html>

{% include head.html %}

<body>
  <div class="header">
    <h1>My Site</h1>
  </div>
  <div class="row">
    <div class="leftcolumn">
      <div class="sidenav">
        <h1><a href="/">Home</a></h1>
        <ul>
          {% for post in site.posts %}
            <li><a href="{{ post.url }}">{{ post.title }}</a></li>
          {% endfor %}
        </ul>
        

      </div>
    </div>
    
    <div class="rightcolumn">
      <div class="content">
        <h1>Hello World!</h1>
      </div>
    </div>
  
  </div>

  {{ content }}

  <div class="footer">
  <p><i>Build by   
    <a href="https://github.com/WGZ-W/" target="_blank">WGZ-W's Github</a>
  </i></p>
</div>

</body>

</html>
